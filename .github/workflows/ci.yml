name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  DOTNET_VERSION: '10.0.x'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore TaskbarUtil.sln

      - name: Test
        run: dotnet test TaskbarUtil.sln --configuration Release --no-restore --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults/*.trx

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $version = Get-Date -Format "yyyy.MM.dd.HHmm"
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build binaries
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          foreach ($rid in @("win-x64", "win-arm64")) {
            Write-Host "Publishing for $rid..."
            dotnet publish src/TaskbarUtil.csproj `
              -c Release -r $rid --self-contained `
              -p:PublishSingleFile=true `
              -p:PublishTrimmed=true `
              -p:TrimMode=partial `
              -p:Version=$version

            $arch = if ($rid -eq "win-x64") { "x64" } else { "arm64" }
            New-Item -ItemType Directory -Path "dist/$arch" -Force | Out-Null
            Copy-Item "src/bin/Release/net10.0-windows10.0.22621.0/$rid/publish/taskbarutil.exe" "dist/$arch/taskbarutil.exe" -Force
            Write-Host "Built: dist/$arch/taskbarutil.exe"
          }

      - name: Download cimipkg
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Path tools -Force | Out-Null
          gh release download --repo windowsadmins/cimian-pkg --pattern "cimipkg-win-x64.zip" --dir tools
          Expand-Archive -Path tools/cimipkg-win-x64.zip -DestinationPath tools -Force
          Write-Host "Downloaded: $(Get-Item tools/cimipkg.exe | Select-Object -ExpandProperty Length) bytes"

      - name: Build MSI packages
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          New-Item -ItemType Directory -Path release -Force | Out-Null

          foreach ($arch in @("x64", "arm64")) {
            $stagingDir = "staging-$arch"

            New-Item -ItemType Directory -Path "$stagingDir/payload" -Force | Out-Null
            New-Item -ItemType Directory -Path "$stagingDir/scripts" -Force | Out-Null

            Copy-Item "dist/$arch/taskbarutil.exe" "$stagingDir/payload/" -Force

            (Get-Content "build/pkg/build-info.yaml" -Raw) `
              -replace '\{\{VERSION\}\}', $version `
              -replace '\{\{ARCHITECTURE\}\}', $arch |
              Set-Content "$stagingDir/build-info.yaml" -Encoding UTF8

            (Get-Content "build/pkg/preinstall.ps1" -Raw) `
              -replace '\{\{VERSION\}\}', $version |
              Set-Content "$stagingDir/scripts/preinstall.ps1" -Encoding UTF8

            (Get-Content "build/pkg/postinstall.ps1" -Raw) `
              -replace '\{\{VERSION\}\}', $version |
              Set-Content "$stagingDir/scripts/postinstall.ps1" -Encoding UTF8

            Write-Host "Building MSI for $arch..."
            & .\tools\cimipkg.exe --verbose $stagingDir
            if ($LASTEXITCODE -ne 0) {
              Write-Host "::error::cimipkg MSI build failed for $arch"
              exit 1
            }

            $msi = Get-ChildItem "$stagingDir/build/*.msi" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($msi) {
              $dest = "release/TaskbarUtil-$arch-$version.msi"
              Move-Item $msi.FullName $dest -Force
              Write-Host "MSI created: $dest ($('{0:N2}' -f ((Get-Item $dest).Length / 1MB)) MB)"
            } else {
              Write-Host "::error::MSI output not found for $arch"
              exit 1
            }
          }

      - name: Build NuGet packages
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"

          foreach ($arch in @("x64", "arm64")) {
            $stagingDir = "staging-$arch"

            Write-Host "Building NuGet package for $arch..."
            & .\tools\cimipkg.exe --nupkg --verbose $stagingDir
            if ($LASTEXITCODE -ne 0) {
              Write-Host "::error::cimipkg NuGet build failed for $arch"
              exit 1
            }

            $nupkg = Get-ChildItem "$stagingDir/build/*.nupkg" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($nupkg) {
              $dest = "release/TaskbarUtil-$arch-$version.nupkg"
              Move-Item $nupkg.FullName $dest -Force
              Write-Host "NuGet package created: $dest"
            } else {
              Write-Host "::warning::NuGet output not found for $arch, skipping"
            }
          }

      - name: Prepare release binaries
        shell: pwsh
        run: |
          foreach ($arch in @("x64", "arm64")) {
            Compress-Archive -Path "dist/$arch/taskbarutil.exe" -DestinationPath "release/taskbarutil-$arch.zip" -Force
            Write-Host "Created: release/taskbarutil-$arch.zip"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: release/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: TaskbarUtil ${{ needs.build.outputs.version }}
          generate_release_notes: true
          files: release/*
          body: |
            ## TaskbarUtil ${{ needs.build.outputs.version }}

            Windows 11 taskbar pin management via local policy.

            ### Installation
            Download the MSI for your architecture and install, or extract the zip to `C:\Program Files\sbin\`.

            ### Assets
            | File | Description |
            |------|-------------|
            | `TaskbarUtil-x64-*.msi` | MSI installer (x64) |
            | `TaskbarUtil-arm64-*.msi` | MSI installer (ARM64) |
            | `taskbarutil-x64.zip` | Standalone binary (x64) |
            | `taskbarutil-arm64.zip` | Standalone binary (ARM64) |

            ---

            ### Signing

            Binaries and MSI packages are provided **unsigned**. For enterprise
            deployment, sign them with your organization's code signing certificate
            before distribution to avoid AV/EDR false positives:

            ```powershell
            # Sign binary
            signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /n "Your Certificate Name" taskbarutil.exe

            # Sign MSI package
            signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /n "Your Certificate Name" TaskbarUtil-x64-*.msi
            ```
